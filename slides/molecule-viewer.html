<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960,height=540">
<title>Molecular Structure — Caffeine</title>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 960px; height: 540px; overflow: hidden;
  font-family: 'PT Sans', sans-serif; background: #fff;
  display: flex; flex-direction: column; padding: 24px 32px;
}
h1 { font-size: 36px; font-weight: 700; color: #222; margin-bottom: 4px; }
.subtitle { font-size: 18px; font-style: italic; color: #888; margin-bottom: 12px; }
.content { flex: 1; display: flex; gap: 20px; }
canvas { border: 1px solid #e5e7eb; border-radius: 4px; cursor: grab; }
.info { width: 200px; font-size: 14px; color: #555; line-height: 1.7; }
.legend { margin-top: 12px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 13px; }
.legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #ccc; }
.formula { font-size: 16px; color: #333; margin-top: 16px; font-weight: 700; }
.hint { font-size: 12px; color: #aaa; margin-top: 16px; font-style: italic; }
</style>
</head>
<body>
<h1>Molecular Structure — Caffeine (C₈H₁₀N₄O₂)</h1>
<p class="subtitle">3D ball-and-stick model with perspective projection</p>
<div class="content">
  <canvas id="cv" width="700" height="420"></canvas>
  <div class="info">
    <div class="formula">C₈H₁₀N₄O₂</div>
    <p style="margin-top:8px;">Molar mass: 194.19 g/mol<br>
    Atoms: 24<br>Bonds: 25</p>
    <div class="legend">
      <strong>Atom colors:</strong>
      <div class="legend-item"><div class="legend-dot" style="background:#404040"></div> Carbon (C)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Nitrogen (N)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div> Oxygen (O)</div>
      <div class="legend-item"><div class="legend-dot" style="background:#d1d5db"></div> Hydrogen (H)</div>
    </div>
    <p class="hint">Drag to rotate</p>
  </div>
</div>
<script>
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
const colors = { C: '#404040', N: '#3b82f6', O: '#ef4444', H: '#d1d5db' };
const radii = { C: 8, N: 8, O: 8, H: 5 };

// Caffeine atom positions (approximate 3D coords, angstroms scaled)
const scale = 40;
const rawAtoms = [
  // Purine ring system + methyl groups (simplified caffeine geometry)
  { e:'N', x:0, y:0, z:0 },        // N1
  { e:'C', x:1.2, y:0.7, z:0 },    // C2
  { e:'O', x:1.3, y:1.9, z:0 },    // O (on C2)
  { e:'N', x:2.3, y:0, z:0 },      // N3
  { e:'C', x:2.3, y:-1.3, z:0 },   // C4
  { e:'C', x:1.1, y:-2, z:0 },     // C5
  { e:'C', x:0, y:-1.3, z:0 },     // C6
  { e:'O', x:-1.1, y:-1.8, z:0 },  // O (on C6)
  { e:'N', x:1.4, y:-3.3, z:0 },   // N7
  { e:'C', x:2.7, y:-3.2, z:0 },   // C8
  { e:'N', x:3.1, y:-1.9, z:0 },   // N9
  // Methyl groups
  { e:'C', x:-1.1, y:0.8, z:0.5 }, // CH3 on N1
  { e:'C', x:3.5, y:0.7, z:-0.3 }, // CH3 on N3
  { e:'C', x:4.4, y:-1.6, z:0.4 }, // CH3 on N9
  // Hydrogens (representative)
  { e:'H', x:3.2, y:-4.0, z:0 },   // H on C8
  { e:'H', x:-1.1, y:1.7, z:1.0 },
  { e:'H', x:-2.0, y:0.4, z:0.2 },
  { e:'H', x:-0.9, y:0.9, z:-0.5 },
  { e:'H', x:3.5, y:1.6, z:-0.9 },
  { e:'H', x:4.3, y:0.3, z:0.2 },
  { e:'H', x:3.6, y:1.0, z:0.6 },
  { e:'H', x:5.1, y:-2.3, z:0.2 },
  { e:'H', x:4.6, y:-0.7, z:-0.1 },
  { e:'H', x:4.5, y:-1.4, z:1.4 },
];
const bonds = [
  [0,1],[1,2],[1,3],[3,4],[4,5],[5,6],[6,0],[6,7],
  [5,8],[8,9],[9,10],[10,4],
  [0,11],[3,12],[10,13],
  [9,14],[11,15],[11,16],[11,17],[12,18],[12,19],[12,20],
  [13,21],[13,22],[13,23]
];

// Center atoms
const cx = rawAtoms.reduce((s,a)=>s+a.x,0)/rawAtoms.length;
const cy = rawAtoms.reduce((s,a)=>s+a.y,0)/rawAtoms.length;
const cz = rawAtoms.reduce((s,a)=>s+a.z,0)/rawAtoms.length;
const atoms = rawAtoms.map(a => ({
  e: a.e,
  x: (a.x - cx) * scale,
  y: (a.y - cy) * scale,
  z: (a.z - cz) * scale
}));

let angleX = 0.3, angleY = 0, autoRotate = true;
let dragging = false, lastMX, lastMY;

function rotateY(p, a) {
  const c = Math.cos(a), s = Math.sin(a);
  return { x: p.x*c + p.z*s, y: p.y, z: -p.x*s + p.z*c, e: p.e };
}
function rotateX(p, a) {
  const c = Math.cos(a), s = Math.sin(a);
  return { x: p.x, y: p.y*c - p.z*s, z: p.y*s + p.z*c, e: p.e };
}
function project(p) {
  const fov = 500, d = fov / (fov + p.z + 200);
  return { x: W/2 + p.x * d, y: H/2 + p.y * d, z: p.z, d, e: p.e };
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const rot = atoms.map(a => {
    let p = rotateY(a, angleY);
    p = rotateX(p, angleX);
    return p;
  });
  const proj = rot.map(p => project(p));

  // Sort bonds by avg z (back to front)
  const sortedBonds = bonds.map(([i,j]) => ({
    i, j, z: (rot[i].z + rot[j].z) / 2
  })).sort((a,b) => a.z - b.z);

  // Draw bonds
  for (const b of sortedBonds) {
    const a = proj[b.i], c = proj[b.j];
    ctx.beginPath();
    ctx.moveTo(a.x, a.y); ctx.lineTo(c.x, c.y);
    ctx.strokeStyle = '#999'; ctx.lineWidth = 2.5 * ((a.d+c.d)/2);
    ctx.stroke();
  }

  // Sort atoms by z (back to front)
  const indices = proj.map((_,i)=>i).sort((a,b) => rot[a].z - rot[b].z);

  for (const i of indices) {
    const p = proj[i];
    const r = radii[p.e] * p.d;
    // sphere shading
    const grad = ctx.createRadialGradient(p.x - r*0.3, p.y - r*0.3, r*0.1, p.x, p.y, r);
    const base = colors[p.e];
    grad.addColorStop(0, lighten(base, 60));
    grad.addColorStop(1, base);
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.5; ctx.stroke();
  }
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r+amt); g = Math.min(255, g+amt); b = Math.min(255, b+amt);
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function loop() {
  if (autoRotate && !dragging) angleY += 0.008;
  draw();
  requestAnimationFrame(loop);
}

cv.addEventListener('mousedown', e => { dragging = true; autoRotate = false; lastMX = e.clientX; lastMY = e.clientY; cv.style.cursor='grabbing'; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  angleY += (e.clientX - lastMX) * 0.01;
  angleX += (e.clientY - lastMY) * 0.01;
  lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => { dragging = false; cv.style.cursor='grab'; });

loop();
</script>
</body>
</html>
