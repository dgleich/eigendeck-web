<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=960,height=540">
<title>Sequence Alignment — Needleman-Wunsch</title>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 960px; height: 540px; overflow: hidden;
  font-family: 'PT Sans', sans-serif; background: #fff;
  display: flex; flex-direction: column; padding: 24px 32px;
}
h1 { font-size: 36px; font-weight: 700; color: #222; margin-bottom: 4px; }
.subtitle { font-size: 18px; font-style: italic; color: #888; margin-bottom: 12px; }
.content { flex: 1; display: flex; gap: 24px; align-items: flex-start; }
.left { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.scoring { font-size: 14px; color: #555; line-height: 1.6; }
.scoring span { font-family: monospace; }
.alignment-result { font-size: 14px; font-family: monospace; line-height: 1.5; color: #333; min-height: 60px; }
.alignment-result .match { color: #2563eb; font-weight: 700; }
.alignment-result .mismatch { color: #dc2626; }
.alignment-result .gap { color: #888; }
canvas { border: 1px solid #e5e7eb; border-radius: 4px; }
.controls { margin-top: 8px; display: flex; gap: 12px; align-items: center; }
button {
  font-family: 'PT Sans', sans-serif; font-size: 14px;
  padding: 6px 16px; border: 1px solid #d1d5db; border-radius: 4px;
  background: #f9fafb; cursor: pointer; color: #333;
}
button:hover { background: #e5e7eb; }
.speed-label { font-size: 13px; color: #666; }
</style>
</head>
<body>
<h1>Sequence Alignment — Needleman-Wunsch</h1>
<p class="subtitle">Dynamic programming for optimal global sequence alignment</p>
<div class="content">
  <div class="left">
    <div class="scoring">
      <strong>Scoring:</strong><br>
      Match = <span>+1</span> &nbsp; Mismatch = <span>−1</span> &nbsp; Gap = <span>−2</span><br><br>
      <strong>Recurrence:</strong><br>
      F(i,j) = max { F(i−1,j−1) + s(aᵢ,bⱼ), F(i−1,j) + d, F(i,j−1) + d }
    </div>
    <div class="alignment-result" id="result"></div>
    <div class="controls">
      <button id="btnStart">▶ Start</button>
      <button id="btnReset">Reset</button>
      <span class="speed-label">Speed: </span>
      <button id="btnSlow">Slow</button>
      <button id="btnFast">Fast</button>
    </div>
  </div>
  <canvas id="cv" width="540" height="400"></canvas>
</div>
<script>
const S1 = "AGTACGCA", S2 = "TATGC";
const MATCH = 1, MISMATCH = -1, GAP = -2;
const rows = S2.length + 1, cols = S1.length + 1;
const dp = [], ptr = []; // ptr: 0=diag,1=up,2=left
for (let i = 0; i < rows; i++) { dp[i] = []; ptr[i] = []; }
// init
for (let j = 0; j < cols; j++) { dp[0][j] = j * GAP; ptr[0][j] = 2; }
for (let i = 0; i < rows; i++) { dp[i][0] = i * GAP; ptr[i][0] = 1; }
ptr[0][0] = -1;
// fill
const fillOrder = [];
for (let i = 1; i < rows; i++) {
  for (let j = 1; j < cols; j++) {
    const s = S1[j-1] === S2[i-1] ? MATCH : MISMATCH;
    const diag = dp[i-1][j-1] + s, up = dp[i-1][j] + GAP, left = dp[i][j-1] + GAP;
    if (diag >= up && diag >= left) { dp[i][j] = diag; ptr[i][j] = 0; }
    else if (up >= left) { dp[i][j] = up; ptr[i][j] = 1; }
    else { dp[i][j] = left; ptr[i][j] = 2; }
    fillOrder.push([i, j]);
  }
}
// traceback
const path = [];
let ti = rows-1, tj = cols-1;
while (ti > 0 || tj > 0) {
  path.push([ti, tj]);
  if (ptr[ti][tj] === 0) { ti--; tj--; }
  else if (ptr[ti][tj] === 1) { ti--; }
  else { tj--; }
}
path.push([0,0]);
path.reverse();

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const CW = 48, CH = 36, OX = 60, OY = 50;
let step = 0, animating = false, delay = 80, pathShown = false;

function drawGrid(filled, showPath) {
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.font = '700 16px PT Sans'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  // seq labels
  ctx.fillStyle = '#2563eb';
  for (let j = 1; j < cols; j++) ctx.fillText(S1[j-1], OX + j*CW + CW/2, OY - 8);
  for (let i = 1; i < rows; i++) ctx.fillText(S2[i-1], OX - 14, OY + i*CH + CH/2);

  const pathSet = new Set();
  if (showPath) path.forEach(([i,j]) => pathSet.add(i+','+j));

  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const x = OX + j*CW, y = OY + i*CH;
      const isFilled = (i === 0 || j === 0) || fillOrder.findIndex(([fi,fj]) => fi===i && fj===j) < filled;
      const onPath = pathSet.has(i+','+j);

      ctx.fillStyle = onPath ? '#dbeafe' : isFilled ? '#f9fafb' : '#fff';
      ctx.fillRect(x, y, CW, CH);
      ctx.strokeStyle = '#d1d5db'; ctx.lineWidth = 1;
      ctx.strokeRect(x, y, CW, CH);

      if (isFilled) {
        ctx.fillStyle = onPath ? '#1d4ed8' : '#333';
        ctx.font = (onPath ? '700' : '400') + ' 14px PT Sans';
        ctx.fillText(dp[i][j], x + CW/2, y + CH/2);
      }
    }
  }
  // highlight current cell
  if (filled > 0 && filled <= fillOrder.length && !showPath) {
    const [ci, cj] = fillOrder[filled - 1];
    const x = OX + cj*CW, y = OY + ci*CH;
    ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2.5;
    ctx.strokeRect(x-1, y-1, CW+2, CH+2);
  }
  // draw path arrows
  if (showPath) {
    ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let k = 0; k < path.length; k++) {
      const [pi, pj] = path[k];
      const x = OX + pj*CW + CW/2, y = OY + pi*CH + CH/2;
      if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

function showAlignment() {
  let a1='', a2='', am='';
  for (let k = 1; k < path.length; k++) {
    const [pi, pj] = path[k], [qi, qj] = path[k-1];
    const di = pi-qi, dj = pj-qj;
    if (di===1 && dj===1) {
      a1 += S1[pj-1]; a2 += S2[pi-1];
      am += S1[pj-1]===S2[pi-1] ? '|' : '·';
    } else if (di===1) {
      a1 += '−'; a2 += S2[pi-1]; am += ' ';
    } else {
      a1 += S1[pj-1]; a2 += '−'; am += ' ';
    }
  }
  const res = document.getElementById('result');
  let html = '<strong>Optimal Alignment (score: '+dp[rows-1][cols-1]+'):</strong><br>';
  html += colorAlign(a1, a2, am);
  res.innerHTML = html;
}
function colorAlign(a1, a2, am) {
  let h1='', h2='', hm='';
  for (let i = 0; i < a1.length; i++) {
    const cls = am[i]==='|' ? 'match' : (a1[i]==='−'||a2[i]==='−') ? 'gap' : 'mismatch';
    h1 += '<span class="'+cls+'">'+a1[i]+'</span>';
    h2 += '<span class="'+cls+'">'+a2[i]+'</span>';
    hm += '<span class="'+cls+'">'+am[i]+'</span>';
  }
  return h1+'<br>'+hm+'<br>'+h2;
}

function animate() {
  if (!animating) return;
  if (step <= fillOrder.length) {
    drawGrid(step, false);
    step++;
    setTimeout(animate, delay);
  } else {
    pathShown = true;
    drawGrid(fillOrder.length, true);
    showAlignment();
    animating = false;
  }
}

document.getElementById('btnStart').onclick = () => {
  if (animating) return;
  if (pathShown) { step = 0; pathShown = false; document.getElementById('result').innerHTML=''; }
  animating = true; animate();
};
document.getElementById('btnReset').onclick = () => {
  animating = false; step = 0; pathShown = false;
  document.getElementById('result').innerHTML = '';
  drawGrid(0, false);
};
document.getElementById('btnSlow').onclick = () => { delay = 150; };
document.getElementById('btnFast').onclick = () => { delay = 30; };

drawGrid(0, false);
</script>
</body>
</html>
