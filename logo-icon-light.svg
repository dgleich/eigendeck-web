<svg width="200" height="240" viewBox="580 355 310 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text { font-family: "PT Sans", "PTSans", Arial, Helvetica, sans-serif; font-weight: 700; fill: #333; }
  </style>
  <!-- back blue screen -->
